name: Site quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate HTML, assets and internal links
        run: python tools/validate_site.py
